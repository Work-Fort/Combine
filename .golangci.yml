# golangci-lint v2 configuration for combine.
#
# Two rules enforce the hexagonal architecture boundary:
#
#   depguard   — prevents non-infra, non-cmd *production* code from importing
#                concrete adapter packages (internal/infra/sqlite,
#                internal/infra/postgres). Test files may import them
#                (sqlite.Open(":memory:") is the endorsed in-memory-store
#                testing pattern). The forbidigo rule below still prohibits
#                leaking the concrete type into function signatures even in
#                test files.
#
#   forbidigo  — prevents sqlite.Store and postgres.Store from appearing in
#                any Go source outside internal/infra/. Within infra, the
#                unqualified Store type is used as receiver so the
#                cross-package qualified form (sqlite.Store) never appears
#                inside the adapters — zero false positives.
#                This catches the "test-fixture leak": a helper that internally
#                constructs a *sqlite.Store but MUST return a port interface.
#
# NOTE: this config uses the golangci-lint v2 format (linters.settings nested
# under linters, not top-level linters-settings). Run `golangci-lint config
# verify` to confirm the schema is valid after any edits.

version: "2"

linters:
  enable:
    - bodyclose
    - depguard
    - forbidigo
    # - exhaustive
    # - goconst
    # - godot
    # - godox
    # - gomoddirectives
    - goprintffuncname
    # - gosec
    - misspell
    # - nakedret
    # - nestif
    # - nilerr
    - noctx
    - nolintlint
    # - prealloc
    # - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    # - unconvert
    # - unparam
    - whitespace
    # - wrapcheck
  disable:
    - errcheck
    - ineffassign
    - unused
    - staticcheck
  settings:
    depguard:
      rules:
        # Production (non-test) files outside internal/infra/ and cmd/ may not
        # import the concrete adapter packages directly. All such code must
        # depend on the port interfaces declared in internal/domain/ports.go.
        #
        # cmd/ is the composition root and is allowed to wire adapters.
        # internal/infra/ contains the adapters themselves.
        # _test.go files are excluded: they may open in-memory SQLite stores
        # for unit tests, but must return port-typed values (forbidigo rule).
        infra-boundary:
          files:
            - "**/*.go"
            - "!**/*_test.go"
            - "!**/internal/infra/**"
            - "!**/cmd/**"
          list-mode: lax
          deny:
            - pkg: github.com/Work-Fort/Combine/internal/infra/sqlite
              desc: >
                Production code outside internal/infra/ and cmd/ must not depend
                on the SQLite adapter. Accept domain.Store as a parameter instead
                of opening a concrete store.
            - pkg: github.com/Work-Fort/Combine/internal/infra/postgres
              desc: >
                Production code outside internal/infra/ and cmd/ must not depend
                on the Postgres adapter. Accept domain.Store as a parameter instead.

    forbidigo:
      # Forbid the qualified concrete types sqlite.Store and postgres.Store in
      # function signatures. The leading * is a separate AST node and must NOT
      # be included in the pattern — forbidigo matches identifier text, not full
      # type expressions. The infra packages themselves use the unqualified Store
      # receiver, so sqlite.Store / postgres.Store never appear inside the
      # adapters — zero false positives.
      #
      # analyze-types is false (default): pattern matches against source text,
      # not type information. Sufficient for catching type-leaked signatures.
      analyze-types: false
      forbid:
        - pattern: 'sqlite\.Store'
          msg: >
            Use a port interface (domain.Store) as the function parameter/return
            type — not the concrete sqlite.Store. See
            skills/lead/go-service-architecture/references/
            architecture-reference.md §"Test Fixture Return Types".
        - pattern: 'postgres\.Store'
          msg: >
            Use a port interface (domain.Store) as the function parameter/return
            type — not the concrete postgres.Store. See
            skills/lead/go-service-architecture/references/
            architecture-reference.md §"Test Fixture Return Types".

  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - text: '(slog|log)\.\w+'
        linters:
          - noctx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
